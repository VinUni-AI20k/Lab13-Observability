service: day13-observability-lab
window: 28d
slis:
  latency_p95_ms:
    objective: 3000
    target: 99.5
    note: >
      P95 latency must stay under 3000ms. Current observed value ~156ms (well within SLO).
      Alert fires at >5000ms for 30m (alert_rules.yaml: high_latency_p95).
  error_rate_pct:
    objective: 2
    target: 99.0
    note: >
      Error rate must stay below 2%. Current observed value 0% (no errors in load test).
      Alert fires at >5% for 5m (alert_rules.yaml: high_error_rate).
  daily_cost_usd:
    objective: 2.5
    target: 100.0
    note: >
      Daily cost must stay under $2.50. Current run: $0.0317 for 15 requests (~$0.002/req).
      Alert fires when hourly cost exceeds 2x baseline for 15m (alert_rules.yaml: cost_budget_spike).
  quality_score_avg:
    objective: 0.75
    target: 95.0
    note: >
      Average quality score (heuristic) must stay above 0.75.
      Current observed value ~0.8 (docs retrieved + answer length heuristic passes).
