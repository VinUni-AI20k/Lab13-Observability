alerts:
  - name: faq_retrieval_slowdown
    severity: P2
    condition: latency_p95_ms > 3000 for 10m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-faq-retrieval-slowdown
    description: "Knowledge base lookup is taking too long, affecting customer support response times."
  - name: faq_service_errors
    severity: P1
    condition: error_rate_pct > 5 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-faq-service-errors
    description: "FAQ service is failing; customers cannot get answers. Immediate response required."
  - name: token_cost_spike
    severity: P2
    condition: hourly_cost_usd > 2x_baseline for 15m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-token-cost-spike
    description: "Response generation is consuming too many tokens, driving up cost."
